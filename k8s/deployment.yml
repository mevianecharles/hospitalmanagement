apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hospital-app
  template:
    metadata:
      labels:
        app: hospital-app
    spec:
      containers:
      - name: hospital-app
        image: hospitalmnmtacr-cucrb7avc6bgfpez.azurecr.io/hospitalmanagement:latest
        ports:
        - containerPort: 7005
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:7005"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: hospital-db-secret
              key: connectionstring