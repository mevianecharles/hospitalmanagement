trigger:
  branches:
    include:
    - main
    - dev

pr:
  branches:
    include:
    - main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '1197439b-728b-4758-a54b-95d7768e16ea'
  imageRepository: 'hospitalmanagement'
  containerRegistry: 'hospitalmnmtacr-cucrb7avc6bgfpez.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/GestorPacientes/Dockerfile'
  tag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:

#  Stage 1 - Build only on dev / BuildAndPush on main
- stage: Build
  displayName:  Build Docker Image
  jobs:
  - job: BuildDev
    displayName: Build only (dev)
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')
    steps:
    - task: Docker@2
      displayName: Build image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'build'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)
          latest

  - job: BuildAndPushMain
    displayName: Build and Push (main)
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    steps:
    - task: Docker@2
      displayName: Build and Push image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)
          latest

#  Stage 2 - Always runs on dev AND main
- stage: CodeAnalysis
  displayName:  Static Code Analysis
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Analysis
    displayName: SonarCloud Analysis
    steps:

    - task: SonarCloudPrepare@4
      displayName: Prepare SonarCloud
      inputs:
        SonarCloud: 'SonarCloudConnection'
        organization: 'magalimeviane'
        scannerMode: 'dotnet'
        projectKey: 'magalimeviane_Hospital-Management'
        projectName: 'Hospital Management'

    - task: DotNetCoreCLI@2
      displayName: Build solution
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration Release'

    - task: SonarCloudAnalyze@4
      displayName: Run analysis

    - task: SonarCloudPublish@4
      displayName: Publish results
      continueOnError: true
      inputs:
        pollingTimeoutSec: '600'