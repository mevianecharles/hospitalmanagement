trigger:
  branches:
    include:
    - main
    - dev

pr:
  branches:
    include:
    - main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '1197439b-728b-4758-a54b-95d7768e16ea'
  imageRepository: 'hospitalmanagement'
  containerRegistry: 'hospitalmnmtacr-cucrb7avc6bgfpez.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:

# Stage 1 - Build
- stage: Build
  displayName: Build Docker Image
  jobs:
  - job: BuildDev
    displayName: Build only (dev)
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')
    steps:
    - task: Docker@2
      displayName: Build image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'build'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)
          latest

  - job: BuildAndPushMain
    displayName: Build and Push (main)
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    steps:
    - task: Docker@2
      displayName: Build and Push image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)
          latest

# Stage 2 - Static Code Analysis
- stage: CodeAnalysis
  displayName: Static Code Analysis
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Analysis
    displayName: SonarCloud Analysis
    steps:
    - task: SonarCloudPrepare@4
      displayName: Prepare SonarCloud
      inputs:
        SonarCloud: 'SonarCloudConnection'
        organization: 'magalimeviane'
        scannerMode: 'dotnet'
        projectKey: 'magalimeviane_Hospital-Management'
        projectName: 'Hospital Management'

    - task: DotNetCoreCLI@2
      displayName: Build solution
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration Release'

    - task: SonarCloudAnalyze@4
      displayName: Run analysis

    - task: SonarCloudPublish@4
      displayName: Publish results
      continueOnError: true
      inputs:
        pollingTimeoutSec: '600'

# Stage 3 - Manifest Integrity Check
- stage: ManifestIntegrityCheck
  displayName: Manifest Integrity Check
  dependsOn: CodeAnalysis
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: VerifyManifests
    displayName: Verify Manifest Integrity
    steps:
    - script: |
        echo "================================================"
        echo "Verifying Kubernetes Manifest Integrity..."
        echo "================================================"
        echo "Generating SHA256 checksums..."
        sha256sum k8s/deployment.yml > /tmp/baseline.sha256
        sha256sum k8s/service.yaml >> /tmp/baseline.sha256
        sha256sum k8s/sqlserver.yaml >> /tmp/baseline.sha256
        echo "Verifying checksums..."
        sha256sum -c /tmp/baseline.sha256
        if [ $? -eq 0 ]; then
          echo "All manifests integrity verified! "
        else
          echo "TAMPERING DETECTED! Stopping pipeline! "
          exit 1
        fi
      displayName: 'SHA256 Checksum Verification'

    - script: |
        echo "Validating YAML syntax..."
        python3 -c "
        import yaml, sys
        files = ['k8s/deployment.yml', 'k8s/service.yaml', 'k8s/sqlserver.yaml']
        for f in files:
            try:
                yaml.safe_load(open(f))
                print(f'OK: {f} - Valid YAML')
            except Exception as e:
                print(f'ERROR: {f} - Invalid: {e}')
                sys.exit(1)
        print('All manifests are valid!')
        "
      displayName: 'Validate YAML Syntax'

    - script: |
        echo "Checking security issues in manifests..."
        if grep -q "privileged: true" k8s/deployment.yml; then
          echo "ERROR: Privileged container found! "
          exit 1
        else
          echo "OK: No privileged containers found "
        fi
        if grep -q "limits:" k8s/deployment.yml; then
          echo "OK: Resource limits configured "
        else
          echo "WARNING: No resource limits set "
        fi
        echo "Security checks completed! "
      displayName: 'Security Policy Check'

# Stage 4 - Deploy to AKS
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: ManifestIntegrityCheck
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: DeployToAKS
    displayName: Deploy to hms-prod-cluster
    steps:
    - task: KubernetesManifest@1
      displayName: Deploy to Kubernetes
      inputs:
        action: 'deploy'
        connectionType: 'azureResourceManager'
        azureSubscriptionConnection: 'aks-service-connection'
        azureResourceGroup: 'HospitalManagement-RG'
        kubernetesCluster: 'hms-prod-cluster'
        namespace: 'default'
        manifests: |
          $(Build.SourcesDirectory)/k8s/deployment.yml
          $(Build.SourcesDirectory)/k8s/service.yaml
        containers: '$(containerRegistry)/$(imageRepository):$(tag)'